<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBS Zermatt</title>
    <link rel="icon" href="images/emblem.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: #ffffff;
            position: relative;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .index-content {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 20px;
            overflow: hidden;
        }

        .poster-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: auto;
            max-width: none;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        @media (max-width: 768px) {
            .poster-bg {
                width: 768px;
            }

            .index-content {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .index-brand {
            position: absolute;
            top: 267px;
            left: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            z-index: 2;
            pointer-events: none;
            user-select: none;
        }

        .index-logo {
            position: static;
            width: 640px;
            max-width: none;
            height: auto;
            filter: brightness(0) invert(1);
        }

        .index-standby-title {
            position: static;
            margin: 0;
            padding-left: 5px;
            color: #a8e6ff; /* --tbs-icy-blue, same as sponsors “Presented by” title */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2rem;
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: 0.01em;
        }

        .index-standby-title:not(.is-ready) {
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .index-brand {
                position: static;
                top: auto;
                left: auto;
                gap: 6px;
                align-items: center;
                text-align: center;
            }

            .index-logo {
                width: 90vw;
            }

            .index-standby-title {
                padding-left: 0;
            }
        }
    </style>
</head>
<body aria-label="Poster background page">
    <div class="index-content">
        <picture>
            <source media="(max-width: 768px)" srcset="images/poster_narrow.png">
            <img src="images/poster_wide.png" alt="" class="poster-bg" decoding="async" fetchpriority="high" aria-hidden="true">
        </picture>
        <div class="index-brand">
            <img src="images/logo.png" alt="TBS Zermatt" class="index-logo">
            <p class="index-standby-title" id="index-standby-title" aria-live="polite"></p>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js" defer></script>
    <script src="index.js?v=20260522-standby-setting" defer></script>
</body>
</html>
