<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <title>Sign in - TBS Zermatt</title>
    <link rel="icon" href="images/emblem.png" type="image/png">
    <link rel="apple-touch-icon" href="images/emblem.png">
    <link rel="stylesheet" href="styles.css?v=20260605-login-backend-logo">
    <link rel="preload" as="image" href="images/narrowposter.webp" type="image/webp" media="(max-width: 768px)" fetchpriority="high">
    <link rel="preload" as="image" href="images/wideposter.webp" type="image/webp" media="(min-width: 769px)" fetchpriority="high">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">

    <main class="main login-main">
        <section class="auth-section" aria-label="Staff sign in">
            <div class="auth-poster" aria-hidden="true">
                <picture>
                    <source media="(max-width: 768px)" srcset="images/narrowposter.webp" type="image/webp">
                    <source media="(min-width: 769px)" srcset="images/wideposter.webp" type="image/webp">
                    <img src="images/wideposter.webp" alt="" class="auth-poster-img" width="1920" height="1300" loading="eager" decoding="async" fetchpriority="high">
                </picture>
            </div>
            <div class="auth-section-content">
                <div class="container">
                    <div class="auth-header-logo">
                        <img src="images/backendlogo.png?v=20260605-backendlogo-v2" alt="TBS Backend" class="auth-header-logo-img auth-header-logo-img--backend" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <h2 class="auth-header-logo-text" style="display: none;">TBS Zermatt</h2>
                    </div>

                    <div class="auth-container auth-container--google">
                        <div class="auth-form" id="loginPanel">
                            <h2 class="auth-title">Staff sign in</h2>

                            <div id="authMessage" class="auth-message" hidden role="alert"></div>

                            <button
                                type="button"
                                id="googleSignInBtn"
                                class="auth-google-btn">
                                <i class="fab fa-google" aria-hidden="true"></i>
                                <span>Continue with Google</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="auth-common.js?v=20260605-google-auth"></script>
    <script src="auth.js?v=20260605-google-auth"></script>
</body>
</html>
