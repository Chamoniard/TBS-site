<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TBS Zermatt</title>
    <link rel="icon" href="images/emblem.png" type="image/png">
    <link rel="apple-touch-icon" href="images/emblem.png">
    <link rel="stylesheet" href="styles.css?v=20260401-remove-live-nav">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main class="main" style="margin: 0; padding: 0;">
        <section class="auth-section" style="height: 100vh; width: 100vw; margin: 0; padding: 0; background: url('images/background.jpg') no-repeat fixed; background-size: cover; background-position: center;">
            <div class="container">
                <div class="auth-header-logo">
                    <img src="images/logo.png" alt="TBS Zermatt" class="auth-header-logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <h2 class="auth-header-logo-text" style="display: none;">TBS Zermatt Blog</h2>
                </div>
                
                <div class="auth-container">
                    <!-- Login Form -->
                    <div class="auth-form" id="loginForm">
                        <h2 class="auth-title">Sign In</h2>
                        <p class="auth-subtitle">Access your TBS Zermatt account</p>
                        
                        <form class="form" id="loginFormElement">
                            <div class="form-group">
                                <label for="loginEmail" class="form-label">Email</label>
                                <input type="email" id="loginEmail" class="form-input" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="loginPassword" class="form-label">Password</label>
                                <input type="password" id="loginPassword" class="form-input" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="rememberMe">
                                    <span class="checkbox-text">Remember me</span>
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Sign In</button>
                            
                            <div class="auth-links">
                                <a href="#" class="auth-link">Forgot password?</a>
                            </div>
                        </form>
                        
                        <div class="auth-switch">
                            <p>Don't have an account? <a href="#" class="auth-link" onclick="showRegisterForm()">Sign up</a></p>
                            <p><a href="index.html" class="auth-link">Backend</a></p>
                        </div>
                    </div>

                    <!-- Registration Form -->
                    <div class="auth-form" id="registerForm" style="display: none;">
                        <h2 class="auth-title">Create Account</h2>
                        <p class="auth-subtitle">Join the TBS Zermatt community</p>
                        
                        <form class="form" id="registerFormElement">
                            <div class="form-group">
                                <label for="registerName" class="form-label">Full Name</label>
                                <input type="text" id="registerName" class="form-input" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="registerEmail" class="form-label">Email</label>
                                <input type="email" id="registerEmail" class="form-input" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="registerPassword" class="form-label">Password</label>
                                <input type="password" id="registerPassword" class="form-input" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-input" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Create Account</button>
                        </form>
                        
                        <div class="auth-switch">
                            <p>Already have an account? <a href="#" class="auth-link" onclick="showLoginForm()">Sign in</a></p>
                        </div>
                    </div>
                </div>
                
                <div class="auth-logo-section">
                    <img src="images/emblem.png" alt="TBS Zermatt" class="auth-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="auth-logo-fallback" style="display: none;">
                        <h3 style="color: #FFD700; margin: 0; font-size: 1.7rem;">TBS ZERMATT</h3>
                        <p style="color: #94a3b8; margin: 0.5rem 0 0 0; font-size: 0.9rem;">THE SICKEST PATIENTS. THE FIRST HOURS.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js?v=20250923-1001"></script>
</body>
</html>
